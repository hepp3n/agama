id: Tessa
name: Tessa Project

description: "A rolling release immutable desktop product, using the COSMIC
  Desktop, leveraging Flatpak for Application Delivery, a Read-Only base, and
  automatic and atomic updates of your system"
icon: MicroOS.svg
software:
  installation_repositories:
    - url: file:///packages/
      archs: x86_64
    - url: https://download.opensuse.org/repositories/home:/heppen:/tessa/openSUSE_Tumbleweed/
      archs: x86_64
  # device labels for offline installation media
  installation_labels:
    - label: Install-Tessa-Project-x86_64
      archs: x86_64
  mandatory_patterns:
    - tessa_base
  optional_patterns: []
  user_patterns: []
  mandatory_packages:
    - NetworkManager
    - openSUSE-repos-MicroOS
    - sudo-policy-wheel-auth-self # explicit wheel group policy to conform new auth model
  optional_packages: []
  base_product: Tessa

security:
  lsm: selinux
  available_lsms:
    selinux:
      patterns: null
    none:
      patterns: null

storage:
  space_policy: delete
  volumes:
    - "/"
  volume_templates:
    - mount_path: "/"
      filesystem: btrfs
      btrfs:
        snapshots: true
        read_only: true
        default_subvolume: "@"
        subvolumes:
          - path: home
          - path: opt
          - path: root
          - path: srv
          - path: usr/local
          - path: boot/writable
          # Unified var subvolume - https://lists.opensuse.org/opensuse-packaging/2017-11/msg00017.html
          - path: var
            copy_on_write: false
      size:
        auto: true
      outline:
        required: true
        snapshots_configurable: false
        filesystems:
          - btrfs
        auto_size:
          base_min: 10 GiB
          base_max: 40 GiB
